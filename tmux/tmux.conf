unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g prefix C-s

setw -g mode-keys vi

# Prevent Escape from messing with vim keybinds
set -s escape-time 0

# Mouse mode
setw -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                              # Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'fabioluciano/tmux-tokyo-night'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'                        # Copy to clipboard
set-option -g @plugin 'b0o/tmux-autoreload'                    # Reload after config changes
set -g @plugin 'sainnhe/tmux-fzf'                              # Use FZF in Tmux
set -g @plugin 'tmux-plugins/tmux-cpu'                         # cpu usage
set -g @plugin 'tmux-plugins/tmux-battery'                     # battery
set -g @plugin 'wfxr/tmux-fzf-url'                             # open url in browser
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'        # Nerdfonts
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Continuum config
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Splits
bind h split-window -c "#{pane_current_path}"
bind H split-window -l '30%' -c "#{pane_current_path}"
bind v split-window -hc "#{pane_current_path}"
bind V split-window -l '33%' -hc "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Kill pane/window
bind x kill-pane
bind X kill-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Pane resize
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# Copy mode vi bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

set-option -g status-position top
set-option -g focus-events on

# Terminal and color support
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Smart pane switching with awareness of Neovim splits
bind-key -n C-S-h if -F "#{@pane-is-vim}" 'send-keys C-S-h' 'select-pane -L'
bind-key -n C-S-j if -F "#{@pane-is-vim}" 'send-keys C-S-j' 'select-pane -D'
bind-key -n C-S-k if -F "#{@pane-is-vim}" 'send-keys C-S-k' 'select-pane -U'
bind-key -n C-S-l if -F "#{@pane-is-vim}" 'send-keys C-S-l' 'select-pane -R'
bind-key -n C-\\ if -F "#{@pane-is-vim}" 'send-keys C-\\' 'select-pane -l'

# Smart pane resizing with awareness of Neovim splits
bind-key -n C-M-h if -F "#{@pane-is-vim}" 'send-keys C-M-h' 'resize-pane -L 3'
bind-key -n C-M-j if -F "#{@pane-is-vim}" 'send-keys C-M-j' 'resize-pane -D 3'
bind-key -n C-M-k if -F "#{@pane-is-vim}" 'send-keys C-M-k' 'resize-pane -U 3'
bind-key -n C-M-l if -F "#{@pane-is-vim}" 'send-keys C-M-l' 'resize-pane -R 3'

# Copy mode pane navigation
bind-key -T copy-mode-vi 'S-C-h' select-pane -L
bind-key -T copy-mode-vi 'S-C-j' select-pane -D
bind-key -T copy-mode-vi 'S-C-k' select-pane -U
bind-key -T copy-mode-vi 'S-C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
