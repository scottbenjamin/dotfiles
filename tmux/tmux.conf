unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

set -g prefix `
bind ` send-prefix

setw -g mode-keys vi

# Prevent Escape from messing with vim keybinds
set -s escape-time 0

# Mouse mode
setw -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'                              # Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'arcticicestudio/nord-tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'                        # Copy to clipboard
set-option -g @plugin 'b0o/tmux-autoreload'                    # Reload after config changes
# set -g @plugin 'sainnhe/tmux-fzf'                              # Use FZF in Tmux
# set -g @plugin 'tmux-plugins/tmux-cpu'                         # cpu usage
# set -g @plugin 'tmux-plugins/tmux-battery'                     # battery
set -g @plugin 'wfxr/tmux-fzf-url'                             # open url in browser
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'        # Nerdfonts
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Resurrect config
set -g @resurrect-strategy-nvim 'session'

# Splits (visual mnemonics: - is horizontal, \ is vertical)
bind - split-window -c "#{pane_current_path}"
bind _ split-window -l '30%' -c "#{pane_current_path}"
bind '\' split-window -hc "#{pane_current_path}"
bind '|' split-window -l '33%' -hc "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Kill pane/window
bind x kill-pane
bind X kill-window

# Swap panes
bind > swap-pane -D
bind < swap-pane -U

# Pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Copy mode vi bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Activity monitoring
setw -g monitor-activity on
set -g visual-activity off

set-option -g status-position top
set-option -g focus-events on

# Allow escape sequences to pass through to the outer terminal (for images, notifications, etc.)
set -g allow-passthrough on

# Terminal and color support
# set -g default-terminal "tmux-256color"
# set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g default-terminal "$TERM"
set-option -ga terminal-overrides ",$TERM:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# FZF window switcher
bind f display-popup -E "tmux list-windows -F '#{window_index}: #{window_name}' | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t"

# Pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind ';' last-pane

# Initialize TMUX plugin manager
run '~/.config/tmux/plugins/tpm/tpm'

# Override status-right to include UTC (must be after TPM)
set -g status-right "#{prefix_highlight}#[fg=brightblack,bg=black,nobold,noitalics,nounderscore]#[fg=white,bg=brightblack] %H:%M #[fg=white,bg=brightblack]│ #(TZ=UTC date +%%H:%%M) UTC #[fg=cyan,bg=brightblack,nobold,noitalics,nounderscore]#[fg=black,bg=cyan,bold] #H "
