# ┃                    Windowrules Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Windows Rules https://wiki.hypr.land/Configuring/Window-Rules/ #

# Float Necessary Windows
windowrule {
    name = float-pavucontrol
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = yes
    size = 990 850
}

windowrule {
    name = float-picture-in-picture-empty-class
    match:class = ^()$
    match:title = ^(Picture in picture)$
    float = yes
}

windowrule {
    name = float-save-file-empty-class
    match:class = ^()$
    match:title = ^(Save File)$
    float = yes
}

windowrule {
    name = float-open-file-empty-class
    match:class = ^()$
    match:title = ^(Open File)$
    float = yes
}

windowrule {
    name = float-librewolf-pip
    match:class = ^(LibreWolf)$
    match:title = ^(Picture-in-Picture)$
    float = yes
}

windowrule {
    name = float-blueman
    match:class = ^(blueman-manager|blueberry.py)$
    float = yes
}

windowrule {
    name = float-xdg-portals
    match:class = ^(xdg-desktop-portal-gtk|xdg-desktop-portal-kde|xdg-desktop-portal-hyprland)(.*)$
    float = yes
}

windowrule {
    name = float-polkit-and-1password
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org.org.kde.polkit-kde-authentication-agent-1|1password)(.*)$
    float = yes
}

windowrule {
    name = float-cachyoshello
    match:class = ^(CachyOSHello)$
    float = yes
}

windowrule {
    name = float-zenity
    match:class = ^(zenity)$
    float = yes
}

# Increase the opacity
windowrule {
    name = opacity-filemanagers
    match:class = ^(thunar|nemo)$
    opacity = 0.92
}

windowrule {
    name = opacity-discord-family
    match:class = ^(discord|armcord|webcord)$
    opacity = 0.96
}

windowrule {
    name = opacity-qq-telegram
    match:title = ^(QQ|Telegram)$
    opacity = 0.95
}

windowrule {
    name = opacity-netease
    match:title = ^(NetEase Cloud Music Gtk4)$
    opacity = 0.95
}

# General window rules
windowrule {
    name = picture-in-picture-geometry
    match:title = ^(Picture-in-Picture)$
    float = yes
    size = 960 540
    move = 25%-
}

windowrule {
    name = media-floats
    match:title = ^(imv|mpv|danmufloat|termfloat|nemo|ncmpcpp)$
    float = yes
    move = 25%-
    size = 960 540
}

windowrule {
    name = pin-danmufloat
    match:title = ^(danmufloat)$
    pin = true
}

windowrule {
    name = no-rounding-danmufloat-termfloat
    match:title = ^(danmufloat|termfloat)$
    rounding = 0
}

windowrule {
    name = slide-animation-terminals
    match:class = ^(kitty|Alacritty|com.mitchellhghostty)$
    animation = slide right
}

windowrule {
    name = no-blur-browsers
    match:class = ^(org.mozilla.firefox|Brave-browser|zen-browser)$
    no_blur = true
}

# Decorations related to floating windows on workspaces 1 to 10
windowrule {
    name = floating-decor-workspaces-1-10
    match:float = true
    match:workspace = w[fv1-10]
    border_size = 2
    border_color = $cachylblue
    rounding = 0
}

# Decorations related to tiling windows on workspaces 1 to 10
windowrule {
    name = tiling-decor-workspaces-1-10
    match:float = false
    match:workspace = f[1-10]
    border_size = 2
    rounding = 0
}

windowrule {
    name = workspace1-browsers
    match:class = ^(zen|Brave-browser)$
    workspace = 1 silent
}

windowrule {
    name = workspace2-discord
    match:class = ^(discord)$
    workspace = 2 silent
}

windowrule {
    name = workspace4-fellowship
    match:title = ^(fellowship)$
    workspace = 4 silent
}

windowrule {
    name = workspace4-fullscreen-games
    match:class = ^(steam_app_.*|.*[Ww]ine.*|proton-game)$
    match:fullscreen = true
    workspace = 4 silent
}

windowrule {
    name = workspace5-steam
    match:class = ^(steam|com.valvesoftware.Steam)$
    workspace = 5 silent
}

windowrule {
    name = float-steam-self-updater
    match:title = ^(Steam - Self Updater)$
    float = yes
}

# Windows Rules End #
#

# Workspaces Rules https://wiki.hypr.land/Configuring/Workspace-Rules/ #
#
# workspace = 1, default:true, monitor:$priMon
# workspace = 6, default:true, monitor:$secMon
# Workspace selectors https://wiki.hypr.land/Configuring/Workspace-Rules/#workspace-selectors
# workspace = r[1-5], monitor:$priMon
# workspace = r[6-10], monitor:$secMon
# workspace = special:scratchpad, on-created-empty:$applauncher
# no_gaps_when_only deprecated instead workspaces rules with selectors can do the same
# Smart gaps from 0.45.0 https://wiki.hypr.land/Configuring/Workspace-Rules/#smart-gaps

workspace = 1, monitor:DP-2, default:true
workspace = 2, monitor:DP-2
workspace = 3, monitor:DP-1, default:true
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1

# Workspaces Rules End #

# Layers Rules #
layerrule {
    name = logout-dialog-animation
    match:namespace = logout_dialog
    animation = slide top
}

layerrule {
    name = waybar-popin-animation
    match:namespace = waybar
    animation = popin 50%
}

layerrule {
    name = waybar-slide-down-animation
    match:namespace = waybar
    animation = slide down
}

layerrule {
    name = wallpaper-fade-animation
    match:namespace = wallpaper
    animation = fade 50%
}
# Layers Rules End #
